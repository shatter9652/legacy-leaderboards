services:
  legacy-leaderboards:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legacy-leaderboards
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=$SECRET_KEY
      - DEBUG=$DEBUG
      - ALLOWED_HOSTS=$ALLOWED_HOSTS
    volumes:
      - ./db.sqlite3:/app/db.sqlite3